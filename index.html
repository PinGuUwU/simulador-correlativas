<body>
  <div id="root">
    <style>
      #loader-skeleton {
        display: flex;
        height: 100vh;
        width: 100vw;
        background-color: #fafafa;
        font-family: sans-serif;
      }

      .sk-sidebar {
        width: 256px;
        border-right: 1px solid #eaeaea;
        display: none;
        padding: 24px;
        flex-direction: column;
        gap: 16px;
      }

      @media (min-width: 1024px) {
        .sk-sidebar {
          display: flex;
        }
      }

      .sk-box {
        background-color: #f0f0f0;
        border-radius: 8px;
        animation: pulse 1.5s infinite ease-in-out;
      }

      .sk-main {
        flex: 1;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      @keyframes pulse {

        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.5;
        }
      }
    </style>
    <div id="loader-skeleton">
      <div class="sk-sidebar">
        <div class="sk-box" style="height: 40px; border-radius: 12px; margin-bottom: 24px;"></div>
        <div class="sk-box" style="height: 48px; border-radius: 12px;"></div>
        <div class="sk-box" style="height: 48px; border-radius: 12px;"></div>
        <div class="sk-box" style="height: 48px; border-radius: 12px;"></div>
      </div>
      <div class="sk-main">
        <div class="sk-box" style="height: 120px; width: 100%; border-radius: 16px;"></div>
        <div class="sk-box" style="height: 60vh; width: 100%; border-radius: 16px;"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
